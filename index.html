<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sherwin-Williams Color Explorer</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="/sw-color-tester/manifest.json" />
    <meta name="theme-color" content="#0066cc" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="SW Colors" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/sw-color-tester/favicon.svg" />

    <!-- Google Fonts (non-blocking) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet"
      />
    </noscript>
    <link
      rel="preload"
      href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      as="style"
      fetchpriority="high"
      onload="
        this.onload = null;
        this.rel = 'stylesheet';
        this.removeAttribute('as');
      "
    />
    <!-- Anti-flash: the gallery is prerendered with the DEFAULT sort baked into
         the static HTML (localStorage is unavailable at prerender time). If the
         visitor persisted a non-default sort, hide the grid before first paint
         so the stale order never shows; React reveals it after re-sorting (see
         AtlasLayout). The key / sort keys mirror storage.ts + FiltersContext. -->
    <style>
      html[data-presort] [data-color-grid] {
        visibility: hidden;
      }
    </style>
    <script>
      (function () {
        try {
          var raw = localStorage.getItem("sw-color-tester:sort");
          if (!raw) return;
          var sort = JSON.parse(raw);
          // All sort keys except the default ("family") — only a non-default
          // persisted sort makes the prerendered order stale.
          var nonDefault = [
            "hue",
            "lrv-asc",
            "lrv-desc",
            "name",
            "neutral-high",
            "neutral-low",
          ];
          if (nonDefault.indexOf(sort) !== -1) {
            document.documentElement.dataset.presort = sort;
          }
        } catch (e) {
          /* storage unavailable / corrupt — show the default order */
        }
      })();
    </script>
    <!--app-head-->
  </head>
  <body>
    <div id="root"><!--app-html--></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
