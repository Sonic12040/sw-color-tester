<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sherwin-Williams Color Explorer</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#0066cc" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="SW Colors" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link
      rel="icon"
      type="image/png"
      href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACAAAAAgCAYAAABzenr0AAAABHNCSVQICAgIfAhkiAAAAAlwSFlzAAAAdgAAAHYBTnsmCAAAABl0RVh0U29mdHdhcmUAd3d3Lmlua3NjYXBlLm9yZ5vuPBoAAAKBSURBVFiFtZe9axRBFMafJwQSCxsLwcJCG1sLG2uxsLGwsLGwsLCwsLGwsLGwsLGwsLGwsLCwsLGwsLCwsLGwsLGwsLGwsLCwsLGwsLCwsLGwsLCwsLGwsLCwsLGwsLCwsLCwsLGwsLCwsLCwsLGwsLCwsLCwsLGwsLCwsLCwsLGwsLCwsLCwsLGwsLGxsLCwsLGwsLCwsLGwsLCwsLGwsLCwsLGwsLCwsLGwsLCwsLGwsLCwsLGwsLCwsLGwsLCwsLGwsLCwsLGwsLCwsLGwsLCwsLGwsLCwsLGwsLCwsLGwsLCwsLGwsLCwsLGwsLCwsLGwsLCwsLGwsLGwsLCwsLGwsLCwsLGwsLCwsLGwsLCwsLGwsLCwsLGwsLCwsLGwsLCwsLGwsLCwsLGwsLCwsLGwsLCwsLGwsLCwsLGwsLGwsLCwsLGwsLCwsLGwsLGwsLCwsLGwsLCwsLGwsLCwsLGwsLCwsLGwsLCwsLGwsLCwsLGwsLCwsLGwsLCwsL"
    />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet"
      />
    </noscript>
    <link
      rel="preload"
      href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      onload="
        this.onload = null;
        this.rel = 'stylesheet';
        this.removeAttribute('as');
      "
      as="style"
      fetchpriority="high"
    />
    <!-- CSS Layer Order Declaration -->
    <style>
      @layer tokens, base, utilities, components, theme, responsive, a11y;
    </style>

    <!-- Application Styles — parallel HTTP/2 loading, no @import waterfall -->
    <link rel="stylesheet" href="css/tokens.css" />
    <link rel="stylesheet" href="css/buttons.css" />
    <link rel="stylesheet" href="css/utilities.css" />
    <link rel="stylesheet" href="css/header.css" />
    <link rel="stylesheet" href="css/lrv-filter.css" />
    <link rel="stylesheet" href="css/accordion.css" />
    <link rel="stylesheet" href="css/color-tile.css" />
    <link rel="stylesheet" href="css/modal.css" />
    <link rel="stylesheet" href="css/confirm.css" />
    <link rel="stylesheet" href="css/toast.css" />
    <link rel="stylesheet" href="css/theme-neutral.css" />
    <link rel="stylesheet" href="css/visualizer.css" />
    <link rel="stylesheet" href="css/responsive.css" />
    <link rel="stylesheet" href="css/a11y.css" />
  </head>
  <body>
    <header class="header">
      <div class="header__top u-flex-between">
        <h1>Sherwin-Williams Color Explorer</h1>
        <button
          type="button"
          id="toolbar-toggle"
          class="toolbar__toggle u-flex-center"
          aria-expanded="false"
          aria-controls="toolbar-panel"
          aria-label="Toggle menu"
        >
          <span class="hamburger" aria-hidden="true">
            <span class="hamburger__line"></span>
            <span class="hamburger__line"></span>
            <span class="hamburger__line"></span>
          </span>
        </button>
      </div>
      <div id="toolbar-panel" class="toolbar__panel" hidden>
        <div class="toolbar__content u-flex-col">
          <div
            class="toolbar__section toolbar__section--lrv"
            aria-label="Light Reflectance Value filter"
          >
            <div class="lrv-filter__header">
              <h2 class="lrv-filter__title">LRV Filter</h2>
              <span class="lrv-filter__range-label" aria-live="polite">
                <span class="lrv-filter__value" id="lrv-value-min">0</span>
                <span class="lrv-filter__separator" aria-hidden="true">–</span>
                <span class="lrv-filter__value" id="lrv-value-max">100</span>
              </span>
              <span class="lrv-filter__count" id="lrv-count"
                >Showing 0000 of 0000 colors</span
              >
              <button
                type="button"
                class="lrv-filter__reset"
                id="lrv-reset"
                aria-label="Reset LRV filter"
              >
                Reset
              </button>
            </div>
            <div class="lrv-filter__track-container u-flex-align">
              <div class="lrv-filter__track">
                <div class="lrv-filter__range" id="lrv-range-fill"></div>
              </div>
              <input
                type="range"
                id="lrv-slider-min"
                class="lrv-filter__input lrv-filter__input--min"
                min="0"
                max="100"
                value="0"
                step="1"
                aria-label="Minimum LRV value"
                aria-valuemin="0"
                aria-valuemax="100"
                aria-valuenow="0"
              />
              <input
                type="range"
                id="lrv-slider-max"
                class="lrv-filter__input lrv-filter__input--max"
                min="0"
                max="100"
                value="100"
                step="1"
                aria-label="Maximum LRV value"
                aria-valuemin="0"
                aria-valuemax="100"
                aria-valuenow="100"
              />
            </div>
          </div>
          <div class="toolbar__section toolbar__section--actions">
            <div class="toolbar__actions u-flex-wrap-center">
              <button
                id="neutral-bg-toggle"
                class="header__button"
                aria-pressed="false"
                title="Toggle neutral gray background for true color evaluation"
              >
                Neutral Background
              </button>
              <button id="export-favorites-btn" class="header__button">
                Export Favorites
              </button>
              <button id="clear-favorites-btn" class="header__button">
                Clear All Favorites
              </button>
              <button id="clear-hidden-btn" class="header__button">
                Clear All Hidden Colors
              </button>
            </div>
          </div>
          <div
            class="toolbar__section toolbar__section--visualizer"
            aria-label="Visualizer settings"
          >
            <h2 class="toolbar__section-title">Visualizer</h2>
            <div class="toolbar__visualizer-controls">
              <div class="visualizer__control-group">
                <label class="visualizer__control-label" for="room-select"
                  >Room</label
                >
                <select id="room-select" class="visualizer__select"></select>
              </div>
              <div class="visualizer__control-group">
                <span class="visualizer__control-label">Lighting</span>
                <div
                  class="visualizer__btn-group"
                  id="lighting-buttons"
                  role="radiogroup"
                  aria-label="Lighting preset"
                ></div>
              </div>
              <div class="visualizer__control-group" id="floor-variant-group">
                <label class="visualizer__control-label" for="floor-select"
                  >Flooring</label
                >
                <select id="floor-select" class="visualizer__select"></select>
              </div>
            </div>
            <div class="toolbar__actions u-flex-wrap-center">
              <button
                type="button"
                class="header__button"
                id="export-room-btn"
                title="Export room design as JSON"
              >
                Export Room
              </button>
              <button
                type="button"
                class="header__button"
                id="import-room-btn"
                title="Import a room design JSON file"
              >
                Import Room
              </button>
              <input type="file" id="import-room-input" accept=".json" hidden />
            </div>
          </div>
        </div>
      </div>
    </header>

    <!-- ── App Shell: tab bar + panels ─────────────────────── -->
    <div class="app-shell">
      <!-- Mobile tab bar (hidden on desktop via CSS) -->
      <nav class="app-tabs" aria-label="App sections">
        <button
          type="button"
          class="app-tabs__btn"
          id="tab-explorer"
          role="tab"
          aria-selected="true"
          aria-controls="panel-explorer"
        >
          Explorer
        </button>
        <button
          type="button"
          class="app-tabs__btn"
          id="tab-visualizer"
          role="tab"
          aria-selected="false"
          aria-controls="panel-visualizer"
        >
          Visualizer
        </button>
      </nav>

      <div class="app-panels">
        <!-- Explorer panel (existing accordion) -->
        <div
          class="app-panel app-panel--explorer"
          id="panel-explorer"
          role="tabpanel"
          aria-labelledby="tab-explorer"
        >
          <main
            id="color-accordion"
            class="accordion"
            aria-label="Color families accordion"
          ></main>
        </div>

        <!-- Visualizer panel -->
        <div
          class="app-panel app-panel--visualizer"
          id="panel-visualizer"
          role="tabpanel"
          aria-labelledby="tab-visualizer"
          hidden
        >
          <section class="visualizer">
            <div class="visualizer__info">
              <span class="visualizer__room-name" id="visualizer-room-name"
                >Modern Living Room</span
              >
            </div>
            <div class="visualizer__canvas" id="visualizer-canvas">
              <!-- SVG injected by VisualizerView -->
            </div>

            <!-- Hint banner — shown when no swatch is selected -->
            <div class="visualizer__hint" id="visualizer-hint">
              <span class="visualizer__hint-icon" aria-hidden="true"
                >&#9757;</span
              >
              Favorite colors in the Explorer, then select a swatch below and
              click any wall to paint it.
            </div>
          </section>
        </div>
      </div>
    </div>

    <!-- PWA Service Worker Registration -->
    <script src="sw-registration.js"></script>

    <!-- Main Application -->
    <script type="module" src="app.js"></script>
  </body>
</html>
